<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DraftMate — Customer Traction Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#0f1629 0%,#1a1f3a 50%,#0f1629 100%);border-bottom:1px solid rgba(99,102,241,.2);padding:32px 48px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#818cf8,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{color:#94a3b8;font-size:14px;margin-top:4px}
.header .date{color:#64748b;font-size:13px;font-weight:500}
.container{max-width:1400px;margin:0 auto;padding:32px 48px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;margin-bottom:32px}
.kpi{background:linear-gradient(135deg,#131836,#1a1f3a);border:1px solid rgba(99,102,241,.15);border-radius:16px;padding:24px;position:relative;overflow:hidden;transition:transform .2s,border-color .3s}
.kpi:hover{transform:translateY(-2px);border-color:rgba(99,102,241,.4)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#6366f1,#a78bfa);border-radius:16px 16px 0 0}
.kpi .label{font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.kpi .value{font-size:36px;font-weight:800;color:#fff}
.kpi .change{font-size:12px;font-weight:600;margin-top:6px;display:flex;align-items:center;gap:4px}
.kpi .change.up{color:#34d399}
.kpi .change.down{color:#f87171}
.charts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-bottom:32px}
.chart-card{background:linear-gradient(135deg,#131836,#1a1f3a);border:1px solid rgba(99,102,241,.12);border-radius:16px;padding:28px;transition:border-color .3s}
.chart-card:hover{border-color:rgba(99,102,241,.3)}
.chart-card h3{font-size:16px;font-weight:700;color:#e2e8f0;margin-bottom:4px}
.chart-card .desc{font-size:12px;color:#64748b;margin-bottom:20px}
.chart-card.full{grid-column:1/-1}
.chart-wrap{position:relative;height:300px}
.chart-card.full .chart-wrap{height:350px}
.section-title{font-size:20px;font-weight:700;color:#e2e8f0;margin:40px 0 20px;padding-left:12px;border-left:3px solid #6366f1}
.user-table-wrap{background:linear-gradient(135deg,#131836,#1a1f3a);border:1px solid rgba(99,102,241,.12);border-radius:16px;padding:28px;max-height:500px;overflow-y:auto}
.user-table-wrap::-webkit-scrollbar{width:6px}
.user-table-wrap::-webkit-scrollbar-thumb{background:#6366f1;border-radius:3px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;padding:12px 16px;border-bottom:1px solid rgba(99,102,241,.15);position:sticky;top:0;background:#151a35}
td{padding:10px 16px;font-size:13px;color:#cbd5e1;border-bottom:1px solid rgba(99,102,241,.06)}
tr:hover td{background:rgba(99,102,241,.05)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge.google{background:rgba(99,102,241,.15);color:#818cf8}
.badge.email{background:rgba(52,211,153,.12);color:#34d399}
.three-col{grid-template-columns:repeat(3,1fr)}
@media(max-width:1200px){.kpi-row{grid-template-columns:repeat(3,1fr)}.charts-grid{grid-template-columns:1fr}}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr)}.container{padding:20px}.header{padding:20px}}
.loading{display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:#818cf8}
</style>
</head>
<body>
<div id="app" class="loading">Loading traction data...</div>
<script>
async function loadData(){
 try{
  const r=await fetch('traction_data.json');
  if(!r.ok) throw new Error('Failed to load');
  return await r.json();
 }catch(e){
  // Fallback: try inline
  console.error(e);
  document.getElementById('app').innerHTML='<p style="color:#f87171;text-align:center;margin-top:40vh">Failed to load traction_data.json. Make sure you run: python3 extract_traction_data.py</p>';
  return null;
 }
}

function fmt(n){return n>=1000?(n/1000).toFixed(1)+'K':n.toString()}
function fmtINR(n){return '₹'+n.toLocaleString('en-IN')}
function pctChange(arr,key='count'){
 if(arr.length<2)return{val:0,dir:'up'};
 const last=arr[arr.length-1][key],prev=arr[arr.length-2][key];
 if(prev===0)return{val:100,dir:'up'};
 const p=Math.round(((last-prev)/prev)*100);
 return{val:Math.abs(p),dir:p>=0?'up':'down'};
}

function render(D){
 const totalRev=D.payment_summary.reduce((s,p)=>p.status==='SUCCESS'?s+p.total_amount:s,0);
 const totalPaid=D.payment_summary.reduce((s,p)=>p.status==='SUCCESS'?s+p.count:s,0);
 const mauChange=pctChange(D.mau);
 const signupChange=pctChange(D.signups_by_month);
 const retRate=D.retention?Math.round((D.retention.returning_users/(D.retention.single_session+D.retention.returning_users))*100):0;

 document.getElementById('app').className='';
 document.getElementById('app').innerHTML=`
<div class="header">
 <div><h1>⚖️ DraftMate — Customer Traction</h1><div class="sub">AI-Powered Legal Drafting Platform • Investor Dashboard</div></div>
 <div class="date">Data as of ${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div>
</div>
<div class="container">
 <div class="kpi-row">
  <div class="kpi"><div class="label">Total Users</div><div class="value">${D.total_users}</div><div class="change up">▲ ${signupChange.val}% vs prev month</div></div>
  <div class="kpi"><div class="label">MAU (Latest)</div><div class="value">${D.mau[D.mau.length-1]?.count||0}</div><div class="change ${mauChange.dir}">▲ ${mauChange.val}% vs prev month</div></div>
  <div class="kpi"><div class="label">Paid Customers</div><div class="value">${totalPaid}</div><div class="change up">${(totalPaid/D.total_users*100).toFixed(1)}% conversion</div></div>
  <div class="kpi"><div class="label">Total Revenue</div><div class="value">${fmtINR(totalRev)}</div><div class="change up">₹${(totalRev/totalPaid||0).toFixed(0)} ARPU</div></div>
  <div class="kpi"><div class="label">Retention Rate</div><div class="value">${retRate}%</div><div class="change up">${D.retention?.returning_users||0} returning users</div></div>
 </div>

 <div class="charts-grid">
  <div class="chart-card full"><h3>📈 Cumulative User Growth</h3><div class="desc">Total registered users over time — the hockey stick</div><div class="chart-wrap"><canvas id="c1"></canvas></div></div>
  <div class="chart-card"><h3>📊 Monthly Signups</h3><div class="desc">New user registrations per month</div><div class="chart-wrap"><canvas id="c2"></canvas></div></div>
  <div class="chart-card"><h3>👥 Monthly Active Users</h3><div class="desc">Unique users with at least one session per month</div><div class="chart-wrap"><canvas id="c3"></canvas></div></div>
  <div class="chart-card"><h3>🔐 Signup Methods</h3><div class="desc">Google OAuth vs Email registration</div><div class="chart-wrap"><canvas id="c4"></canvas></div></div>
  <div class="chart-card"><h3>🔁 User Retention</h3><div class="desc">Single-session vs returning vs power users (5+ sessions)</div><div class="chart-wrap"><canvas id="c5"></canvas></div></div>
  <div class="chart-card"><h3>📅 Weekly Active Users</h3><div class="desc">Unique users per week showing engagement trend</div><div class="chart-wrap"><canvas id="c6"></canvas></div></div>
  <div class="chart-card"><h3>💰 Revenue Timeline</h3><div class="desc">Cumulative revenue from paid subscriptions</div><div class="chart-wrap"><canvas id="c7"></canvas></div></div>
 </div>

 <div class="section-title">👤 User Roles (from profiles)</div>
 <div class="charts-grid three-col" style="margin-bottom:32px">
  <div class="chart-card" style="grid-column:1/-1"><h3>Legal Professional Distribution</h3><div class="desc">Self-reported roles from user profiles (${D.profiles_completed} profiles completed out of ${D.total_users} users)</div><div class="chart-wrap" style="height:250px"><canvas id="c8"></canvas></div></div>
 </div>

 <div class="section-title">📋 Recent Users (${D.all_users.length} total)</div>
 <div class="user-table-wrap">
  <table><thead><tr><th>#</th><th>Email</th><th>Signup Date</th><th>Method</th></tr></thead>
  <tbody>${D.all_users.slice().reverse().map((u,i)=>`<tr><td>${D.all_users.length-i}</td><td>${u.email}</td><td>${u.created_at?new Date(u.created_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'-'}</td><td><span class="badge ${u.method.toLowerCase()}">${u.method}</span></td></tr>`).join('')}</tbody></table>
 </div>
</div>`;

 const G={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(99,102,241,.08)'},ticks:{color:'#64748b',font:{size:10}}},y:{grid:{color:'rgba(99,102,241,.08)'},ticks:{color:'#64748b',font:{size:10}}}}};
 const GL={...G,plugins:{legend:{display:true,labels:{color:'#94a3b8',font:{size:11}}}}};

 // C1: Cumulative growth
 new Chart(document.getElementById('c1'),{type:'line',data:{labels:D.cumulative_signups.map(d=>d.date.slice(5)),datasets:[{label:'Total Users',data:D.cumulative_signups.map(d=>d.cumulative),borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,.12)',fill:true,tension:.3,pointRadius:1,borderWidth:2.5},{label:'Daily Signups',data:D.cumulative_signups.map(d=>d.daily),borderColor:'#34d399',backgroundColor:'rgba(52,211,153,.1)',fill:false,tension:.3,pointRadius:2,borderWidth:1.5,yAxisID:'y1'}]},options:{...GL,scales:{...GL.scales,y1:{position:'right',grid:{display:false},ticks:{color:'#34d399',font:{size:10}}}}}});

 // C2: Monthly signups bar
 new Chart(document.getElementById('c2'),{type:'bar',data:{labels:D.signups_by_month.map(d=>d.month),datasets:[{data:D.signups_by_month.map(d=>d.count),backgroundColor:D.signups_by_month.map((_,i)=>`hsla(${240+i*15},70%,65%,.7)`),borderRadius:8,borderSkipped:false}]},options:G});

 // C3: MAU
 new Chart(document.getElementById('c3'),{type:'line',data:{labels:D.mau.map(d=>d.month),datasets:[{data:D.mau.map(d=>d.count),borderColor:'#a78bfa',backgroundColor:'rgba(167,139,250,.15)',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#a78bfa',borderWidth:2.5}]},options:G});

 // C4: Signup methods donut
 new Chart(document.getElementById('c4'),{type:'doughnut',data:{labels:D.signup_methods.map(d=>d.method),datasets:[{data:D.signup_methods.map(d=>d.count),backgroundColor:['#34d399','#6366f1'],borderWidth:0,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:12},padding:20}}}}});

 // C5: Retention donut
 new Chart(document.getElementById('c5'),{type:'doughnut',data:{labels:['Single Session','Returning (2-4)','Power Users (5+)'],datasets:[{data:[D.retention.single_session,D.retention.returning_users-D.retention.power_users,D.retention.power_users],backgroundColor:['#64748b','#6366f1','#34d399'],borderWidth:0,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:11},padding:16}}}}});

 // C6: WAU
 new Chart(document.getElementById('c6'),{type:'line',data:{labels:D.wau.map(d=>d.date.slice(5)),datasets:[{data:D.wau.map(d=>d.count),borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.1)',fill:true,tension:.3,pointRadius:2,borderWidth:2}]},options:G});

 // C7: Revenue
 if(D.cumulative_revenue.length){
  new Chart(document.getElementById('c7'),{type:'bar',data:{labels:D.cumulative_revenue.map(d=>d.date),datasets:[{label:'Daily',data:D.cumulative_revenue.map(d=>d.daily),backgroundColor:'rgba(52,211,153,.6)',borderRadius:6},{label:'Cumulative',data:D.cumulative_revenue.map(d=>d.cumulative),type:'line',borderColor:'#6366f1',pointBackgroundColor:'#6366f1',borderWidth:2.5,tension:.3,yAxisID:'y1'}]},options:{...GL,scales:{...GL.scales,y1:{position:'right',grid:{display:false},ticks:{color:'#6366f1',callback:v=>'₹'+v}}}}});
 }else{document.getElementById('c7').parentElement.innerHTML='<p style="color:#64748b;text-align:center;padding:60px">No revenue data yet</p>';}

 // C8: Roles - merge case-insensitive
 const roleMap={};
 D.user_roles.filter(r=>!['Hsbbbs','GOAT','Teenager','Bill maker'].includes(r.role.trim())).forEach(r=>{const k=r.role.trim().toLowerCase();roleMap[k]=(roleMap[k]||{role:r.role.trim(),count:0});roleMap[k].count+=r.count;});
 const roles=Object.values(roleMap).sort((a,b)=>b.count-a.count).slice(0,10);
 if(roles.length){
  new Chart(document.getElementById('c8'),{type:'bar',data:{labels:roles.map(r=>r.role),datasets:[{data:roles.map(r=>r.count),backgroundColor:roles.map((_,i)=>`hsla(${200+i*20},65%,60%,.7)`),borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{color:'#64748b',font:{size:10},stepSize:1},grid:{color:'rgba(99,102,241,.08)'}},y:{ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'rgba(99,102,241,.08)'}}}}});
 }
}

loadData().then(d=>{if(d)render(d);});
</script>
</body>
</html>

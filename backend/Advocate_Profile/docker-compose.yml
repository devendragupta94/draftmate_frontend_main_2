version: '3.8'

services:
  advocate-profile:
    build: .
    ports:
      - "8007:8007"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
